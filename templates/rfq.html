<!DOCTYPE html>
<html>
<head>
    <title>RFQ Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>RFQ Management</h1>

    <button class="btn btn-primary mb-3">
        Create RFQ
    </button>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>RFQ Title</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Deadline</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Laptop Purchase</td>
                <td>Dell Latitude</td>
                <td>10</td>
                <td>20-06-2026</td>
            </tr>

            <tr>
                <td>Office Chairs</td>
                <td>Ergonomic Chair</td>
                <td>50</td>
                <td>25-06-2026</td>
            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
